<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikari-Kazue EPUB Studio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center; color:white; }
        .cover-preview { width: 140px; height: 200px; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .chapter-img { height: 70px; width: 70px; object-fit: cover; border-radius: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32">

    <!-- Loader -->
    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p id="loaderText" class="font-bold tracking-widest text-sm uppercase">Hikari Engine: Processing...</p>
    </div>

    <div class="max-w-4xl mx-auto p-4 md:pt-10">
        <!-- Branding Header -->
        <header class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl mb-8 relative overflow-hidden flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="relative z-10 text-center md:text-left">
                <h1 class="text-3xl font-extrabold tracking-tighter">HIKARI <span class="text-indigo-400">STUDIO</span></h1>
                <p class="text-slate-400 text-xs uppercase tracking-widest font-bold">Kazue Engine v4.0 Pro</p>
                <div id="saveStatus" class="mt-3 flex items-center gap-2 text-[10px] text-emerald-400 font-bold uppercase">
                    <span class="status-dot bg-emerald-500 animate-pulse"></span> Draft Autosaved
                </div>
            </div>
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-600 rounded-full blur-3xl opacity-20"></div>
        </header>

        <!-- Metadata & Cover Section -->
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm mb-6 border border-slate-200 flex flex-col md:flex-row gap-8">
            <!-- Cover Upload -->
            <div class="flex flex-col items-center gap-3">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Book Cover</p>
                <div class="w-[140px] h-[200px] bg-slate-100 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-slate-300 relative overflow-hidden group">
                    <img id="coverDisplay" class="hidden cover-preview">
                    <div id="coverPlaceholder" class="text-center p-4">
                        <span class="text-2xl text-slate-300">🖼️</span>
                        <p class="text-[8px] text-slate-400 font-bold mt-2 uppercase">Klik/Drop Cover</p>
                    </div>
                    <input type="file" accept="image/*" onchange="handleCover(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
                <button onclick="removeCover()" class="text-[9px] text-red-400 font-bold uppercase">Hapus Cover</button>
            </div>

            <!-- Fields -->
            <div class="flex-1 grid grid-cols-1 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Judul Buku</label>
                    <input type="text" id="title" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-lg font-bold" placeholder="Judul Buku">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nama Pengarang</label>
                    <input type="text" id="author" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Nama Penulis">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Bahasa</label>
                        <input type="text" id="lang" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl outline-none" value="id">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Status Draft</label>
                        <div class="w-full bg-slate-50 p-4 rounded-2xl text-[10px] font-bold text-indigo-500">READY</div>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Deskripsi / Anotasi</label>
                    <textarea id="description" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl outline-none text-sm" rows="2" placeholder="Tentang buku ini..."></textarea>
                </div>
            </div>
        </div>

        <!-- Chapters Area -->
        <div id="chaptersContainer" class="space-y-6"></div>

        <!-- Add Chapter -->
        <button onclick="addChapter()" class="w-full mt-6 py-8 border-2 border-dashed border-slate-300 rounded-[2.5rem] text-slate-400 font-bold hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex flex-col items-center justify-center">
            <span class="text-2xl">+</span>
            <span class="text-xs uppercase tracking-widest">Tambah Bab Baru</span>
        </button>
    </div>

    <!-- Floating UI Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-slate-900/90 backdrop-blur-2xl p-4 rounded-full shadow-2xl border border-white/10 flex justify-between items-center z-50">
        <div class="pl-4">
            <p class="text-white font-bold text-sm tracking-tight" id="statsTitle">Hikari Draft</p>
            <p class="text-slate-400 text-[10px] uppercase font-bold" id="statsChapters">0 Bab</p>
        </div>
        <div class="flex gap-2">
            <button onclick="clearData()" title="Reset Semua" class="p-2 text-slate-400 hover:text-red-400 transition">🗑️</button>
            <button onclick="generateEpub()" id="btnDownload" class="bg-indigo-500 hover:bg-indigo-600 text-white px-8 py-2.5 rounded-full font-bold text-sm shadow-lg transition transform active:scale-95">
                DOWNLOAD
            </button>
        </div>
    </nav>

    <script>
        const DB_NAME = "HikariKazueV4DB";
        let db, chapters = [], coverData = null;

        // --- Database & Autosave ---
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("state", { keyPath: "id" });
        request.onsuccess = e => { db = e.target.result; loadFromDB(); };

        function saveToDB() {
            if(!db) return;
            const state = {
                id: "current",
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                description: document.getElementById('description').value,
                lang: document.getElementById('lang').value,
                chapters: chapters,
                cover: coverData
            };
            db.transaction("state", "readwrite").objectStore("state").put(state);
            document.getElementById('saveStatus').innerHTML = '<span class="status-dot bg-emerald-500"></span> Saved to Browser';
        }

        function loadFromDB() {
            db.transaction("state", "readonly").objectStore("state").get("current").onsuccess = e => {
                if (e.target.result) {
                    const res = e.target.result;
                    document.getElementById('title').value = res.title || "";
                    document.getElementById('author').value = res.author || "";
                    document.getElementById('description').value = res.description || "";
                    document.getElementById('lang').value = res.lang || "id";
                    chapters = res.chapters || [];
                    coverData = res.cover || null;
                    if(coverData) {
                        const img = document.getElementById('coverDisplay');
                        img.src = URL.createObjectURL(new Blob([coverData]));
                        img.classList.remove('hidden');
                        document.getElementById('coverPlaceholder').classList.add('hidden');
                    }
                }
                if (chapters.length === 0) addChapter();
                renderChapters();
                updateStats();
            };
        }

        function triggerAutoSave() {
            document.getElementById('saveStatus').innerHTML = '<span class="status-dot bg-amber-500 animate-pulse"></span> Saving...';
            clearTimeout(window.saveTimeout);
            window.saveTimeout = setTimeout(saveToDB, 1500);
            updateStats();
        }

        function updateStats() {
            document.getElementById('statsTitle').innerText = document.getElementById('title').value || "Hikari Draft";
            document.getElementById('statsChapters').innerText = `${chapters.length} Bab`;
        }

        // --- Kazue Engine: Image Optimization ---
        async function optimizeImage(buffer, isCover = false) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(new Blob([buffer]));
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = isCover ? 1200 : 1080;
                    if (w > max) { h *= max/w; w = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(b => b.arrayBuffer().then(resolve), 'image/jpeg', 0.75);
                };
            });
        }

        async function handleCover(e) {
            const f = e.target.files[0]; if(!f) return;
            toggleLoader(true, "Optimizing Cover...");
            coverData = await optimizeImage(await f.arrayBuffer(), true);
            const img = document.getElementById('coverDisplay');
            img.src = URL.createObjectURL(new Blob([coverData]));
            img.classList.remove('hidden');
            document.getElementById('coverPlaceholder').classList.add('hidden');
            toggleLoader(false); triggerAutoSave();
        }

        function removeCover() {
            coverData = null;
            document.getElementById('coverDisplay').classList.add('hidden');
            document.getElementById('coverPlaceholder').classList.remove('hidden');
            triggerAutoSave();
        }

        // --- Chapter Management ---
        function renderChapters() {
            const container = document.getElementById('chaptersContainer');
            container.innerHTML = '';
            chapters.forEach((ch, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200";
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3 flex-1">
                             <span class="bg-indigo-100 text-indigo-600 text-xs font-black w-8 h-8 flex items-center justify-center rounded-xl">${idx + 1}</span>
                             <input type="text" value="${ch.title}" oninput="chapters[${idx}].title=this.value; triggerAutoSave()" class="text-lg font-bold bg-transparent outline-none w-full border-b border-transparent focus:border-indigo-500 transition" placeholder="Judul Bab">
                        </div>
                        <div class="flex gap-1 ml-2">
                            <button onclick="move(${idx}, -1)" class="p-2 hover:bg-slate-100 rounded-lg text-slate-400 hover:text-indigo-600">▲</button>
                            <button onclick="move(${idx}, 1)" class="p-2 hover:bg-slate-100 rounded-lg text-slate-400 hover:text-indigo-600">▼</button>
                            <button onclick="remove(${idx})" class="p-2 text-slate-300 hover:text-red-500">🗑️</button>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 p-5 rounded-3xl mb-4 border border-slate-100">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3">Chapter Media</p>
                        <div class="flex flex-wrap gap-3 mb-4" id="imgList-${idx}">
                            ${ch.images.map((img, iIdx) => `
                                <div class="relative group">
                                    <img src="${URL.createObjectURL(new Blob([img.data]))}" class="chapter-img border-2 border-white shadow-sm transition group-hover:opacity-75">
                                    <button onclick="delImg(${idx}, ${iIdx})" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs border-2 border-white">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex flex-col md:flex-row gap-3">
                            <input type="file" accept="image/*" onchange="upImg(event, ${idx})" class="text-[10px] flex-1 bg-white p-2 rounded-xl border border-slate-200">
                            <div class="flex gap-2 flex-1">
                                <input type="text" placeholder="URL Gambar (Blogger dll)" class="text-xs bg-white border border-slate-200 p-2 rounded-xl flex-1 outline-none focus:ring-1 focus:ring-indigo-500" id="urlInput-${idx}">
                                <button onclick="handleUrlUpload(${idx})" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-tighter">Tambah URL</button>
                            </div>
                        </div>
                    </div>
                    
                    <textarea oninput="chapters[${idx}].content=this.value; triggerAutoSave()" class="w-full h-48 bg-slate-50 border-0 p-6 rounded-[2rem] outline-none text-sm leading-relaxed text-slate-700 focus:ring-2 focus:ring-indigo-100 transition" placeholder="Tulis bab ini di sini...">${ch.content}</textarea>
                `;
                container.appendChild(div);
            });
        }

        function addChapter() { chapters.push({ title: "Bab Baru", content: "", images: [] }); renderChapters(); triggerAutoSave(); }
        function remove(i) { if(chapters.length > 1) { chapters.splice(i, 1); renderChapters(); triggerAutoSave(); } }
        function move(i, d) { let n = i + d; if(n >= 0 && n < chapters.length) { [chapters[i], chapters[n]] = [chapters[n], chapters[i]]; renderChapters(); triggerAutoSave(); } }
        
        async function upImg(e, i) {
            const f = e.target.files[0]; if(!f) return;
            toggleLoader(true, "Optimizing Media...");
            const opt = await optimizeImage(await f.arrayBuffer());
            chapters[i].images.push({ id: "hkr_"+Math.random().toString(36).substr(2,5), data: opt });
            toggleLoader(false); renderChapters(); triggerAutoSave();
        }

        async function handleUrlUpload(idx) {
            const input = document.getElementById(`urlInput-${idx}`);
            const url = input.value; if(!url) return;
            toggleLoader(true, "Downloading External Image...");
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const opt = await optimizeImage(await blob.arrayBuffer());
                chapters[idx].images.push({ id: "hkr_"+Math.random().toString(36).substr(2,5), data: opt });
                input.value = "";
                renderChapters(); triggerAutoSave();
            } catch(e) { alert("CORS Blocked: Gunakan Upload File jika URL ditolak."); }
            toggleLoader(false);
        }

        function delImg(ci, ii) { chapters[ci].images.splice(ii, 1); renderChapters(); triggerAutoSave(); }
        function toggleLoader(s, t="") { document.getElementById('loader').style.display = s?'flex':'none'; if(t) document.getElementById('loaderText').innerText = t; }
        function clearData() { if(confirm("Hapus semua draft dari browser?")) { db.transaction("state", "readwrite").objectStore("state").clear(); location.reload(); } }

        // --- Core EPUB Generator ---
        async function generateEpub() {
            toggleLoader(true, "Hikari Engine: Packaging EPUB...");
            const zip = new JSZip();
            const title = document.getElementById('title').value || "Untitled Hikari Book";
            const author = document.getElementById('author').value || "Kazue User";
            const lang = document.getElementById('lang').value || "id";
            const desc = document.getElementById('description').value || "";
            const uuid = "urn:uuid:" + self.crypto.randomUUID();

            // Structure
            zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
            zip.folder("META-INF").file("container.xml", `<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);

            let manifest = ""; let spine = ""; let ncx = "";
            
            // Cover Image
            if(coverData) {
                zip.folder("OEBPS/Images").file("cover.jpg", coverData);
                manifest += `<item id="cover-img" href="Images/cover.jpg" media-type="image/jpeg" properties="cover-image"/>\n`;
            }

            // Chapters & Images
            chapters.forEach((ch, i) => {
                const f = `ch${i+1}.xhtml`;
                let imgH = "";
                ch.images.forEach(img => {
                    zip.folder("OEBPS/Images").file(`${img.id}.jpg`, img.data);
                    manifest += `<item id="${img.id}" href="Images/${img.id}.jpg" media-type="image/jpeg"/>\n`;
                    imgH += `<div style="text-align:center;margin:1.5em 0;"><img src="../Images/${img.id}.jpg" style="max-width:100%; border-radius:10px;"/></div>\n`;
                });
                
                const html = `<?xml version="1.0" encoding="utf-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>${ch.title}</title><style>body{padding:6%;line-height:1.8;font-family:serif;color:#333;}h2{text-align:center;color:#4f46e5;border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:1.5em;}</style></head><body><h2>${ch.title}</h2>${imgH}<div style="white-space:pre-wrap;">${ch.content}</div></body></html>`;
                
                zip.folder("OEBPS/Text").file(f, html);
                manifest += `<item id="item${i+1}" href="Text/${f}" media-type="application/xhtml+xml"/>\n`;
                spine += `<itemref idref="item${i+1}"/>\n`;
                ncx += `<navPoint id="n${i+1}" playOrder="${i+1}"><navLabel><text>${ch.title}</text></navLabel><content src="Text/${f}"/></navPoint>\n`;
            });

            // Metadata OPF
            const opf = `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" unique-identifier="pub-id" version="3.0">
    <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
        <dc:title>${title}</dc:title>
        <dc:creator>${author}</dc:creator>
        <dc:language>${lang}</dc:language>
        <dc:identifier id="pub-id">${uuid}</dc:identifier>
        <dc:description>${desc}</dc:description>
        <meta property="dcterms:modified">${new Date().toISOString().split('.')[0]}Z</meta>
        ${coverData ? '<meta name="cover" content="cover-img"/>' : ''}
    </metadata>
    <manifest>
        <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
        ${manifest}
    </manifest>
    <spine toc="ncx">${spine}</spine>
</package>`;

            zip.folder("OEBPS").file("content.opf", opf);
            zip.folder("OEBPS").file("toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="${uuid}"/></head><docTitle><text>${title}</text></docTitle><navMap>${ncx}</navMap></ncx>`);

            const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: {level:9} });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${title.replace(/\s+/g,'_')}.epub`; a.click();
            toggleLoader(false);
        }

        // SW for PWA
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
