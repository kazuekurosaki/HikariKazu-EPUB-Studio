<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HikariKazu EPUB Studio</title>
    <!-- Library untuk membuat file ZIP/EPUB -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Library untuk UI Responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .preview-img { height: 90px; width: 90px; object-fit: cover; border-radius: 12px; }
        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center; color:white; }
        .chapter-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <!-- Loader Overlay -->
    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p id="loaderText" class="font-bold text-lg">Hikari Engine: Memproses...</p>
    </div>

    <div class="max-w-4xl mx-auto p-4 md:pt-10">
        <!-- Branding Header -->
        <header class="bg-slate-900 text-white p-8 rounded-3xl shadow-2xl mb-8 relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-4xl font-extrabold tracking-tighter">HIKARI <span class="text-indigo-400">STUDIO</span></h1>
                <p class="text-slate-400 text-sm mt-1 uppercase tracking-widest font-semibold">Powered by Kazue Kurosaki</p>
                <div class="mt-4 flex gap-2">
                    <span class="bg-indigo-500/20 text-indigo-300 text-[10px] px-2 py-1 rounded-md border border-indigo-500/30 font-bold">OPTIMIZED SIZE</span>
                    <span class="bg-emerald-500/20 text-emerald-300 text-[10px] px-2 py-1 rounded-md border border-emerald-500/30 font-bold">DRM FREE</span>
                </div>
            </div>
            <!-- Dekorasi Lingkaran -->
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-600 rounded-full blur-3xl opacity-20"></div>
        </header>

        <!-- Metadata Section -->
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 border border-slate-200">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-indigo-500 rounded-full"></span> Metadata Dokumen
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 ml-1">Judul Buku</label>
                    <input type="text" id="title" class="w-full bg-slate-100 border-0 p-3 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Masukkan Judul">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 ml-1">Nama Pengarang</label>
                    <input type="text" id="author" class="w-full bg-slate-100 border-0 p-3 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Penulis">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 ml-1">Bahasa</label>
                    <input type="text" id="lang" class="w-full bg-slate-100 border-0 p-3 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition" value="id">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 ml-1">Anotasi / Deskripsi</label>
                    <textarea id="description" class="w-full bg-slate-100 border-0 p-3 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition" rows="1" placeholder="Tentang buku ini..."></textarea>
                </div>
            </div>
        </div>

        <!-- Chapters Container -->
        <div id="chaptersContainer" class="space-y-6"></div>

        <!-- Add Chapter Button -->
        <button onclick="addChapter()" class="w-full mt-6 py-6 border-2 border-dashed border-slate-300 rounded-3xl text-slate-500 font-bold hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex flex-col items-center justify-center gap-1">
            <span class="text-2xl">+</span>
            <span class="text-sm uppercase tracking-tighter">Tambah Bab Baru</span>
        </button>
    </div>

    <!-- Floating Navbar -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/90 backdrop-blur-xl p-4 rounded-full shadow-2xl border border-white/10 flex justify-between items-center z-50">
        <div class="pl-4">
            <p class="text-white font-bold text-xs">Hikari Engine</p>
            <p class="text-slate-400 text-[10px]" id="statsInfo">1 Bab Terdaftar</p>
        </div>
        <button onclick="generateEpub()" id="btnDownload" class="bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-2 rounded-full font-bold text-sm shadow-lg transition transform active:scale-95">
            Download .EPUB
        </button>
    </nav>

    <script>
        let chapters = [{ id: Date.now(), title: "Bab 1: Permulaan", content: "", images: [] }];

        // Loader helper
        function toggleLoader(show, text = "") {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
            if(text) document.getElementById('loaderText').innerText = text;
        }

        // --- Kazue Engine: Image Optimization ---
        async function optimizeImage(buffer) {
            return new Promise((resolve) => {
                const blob = new Blob([buffer]);
                const img = new Image();
                img.src = URL.createObjectURL(blob);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // Resize ke max 1080px lebar
                    const MAX_WIDTH = 1080;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Export ke JPEG kualitas 0.7 agar ukuran file kecil
                    canvas.toBlob((b) => {
                        b.arrayBuffer().then(resolve);
                    }, 'image/jpeg', 0.7);
                };
            });
        }

        function renderChapters() {
            const container = document.getElementById('chaptersContainer');
            container.innerHTML = '';
            document.getElementById('statsInfo').innerText = `${chapters.length} Bab Terdaftar`;

            chapters.forEach((ch, index) => {
                const div = document.createElement('div');
                div.className = "chapter-card bg-white p-6 rounded-3xl shadow-sm border border-slate-200 relative";
                div.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                        <div class="flex items-center gap-3 flex-1">
                            <span class="bg-indigo-600 text-white w-10 h-10 flex items-center justify-center rounded-2xl font-black shadow-lg shadow-indigo-200">${index + 1}</span>
                            <input type="text" value="${ch.title}" onchange="updateChapter(${index}, 'title', this.value)" class="text-xl font-bold border-b-2 border-transparent focus:border-indigo-500 outline-none w-full bg-transparent p-1 transition">
                        </div>
                        <div class="flex bg-slate-100 p-1 rounded-2xl">
                            <button onclick="moveChapter(${index}, -1)" class="p-2 hover:bg-white rounded-xl transition text-slate-600">▲</button>
                            <button onclick="moveChapter(${index}, 1)" class="p-2 hover:bg-white rounded-xl transition text-slate-600">▼</button>
                            <button onclick="removeChapter(${index})" class="p-2 hover:bg-red-100 rounded-xl transition text-red-500 ml-2">🗑️</button>
                        </div>
                    </div>

                    <div class="mb-6 bg-slate-50 p-5 rounded-3xl border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">Media Bab (Optimized by Kazue)</p>
                        <div class="flex flex-wrap gap-3 mb-4">
                            ${ch.images.map((img, imgIdx) => `
                                <div class="relative group">
                                    <img src="${URL.createObjectURL(new Blob([img.data]))}" class="preview-img border-2 border-white shadow-md">
                                    <button onclick="deleteImage(${index}, ${imgIdx})" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs border-2 border-white">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex flex-col md:flex-row gap-3">
                            <div class="flex-1 bg-white p-2 rounded-2xl border border-slate-200">
                                <input type="file" accept="image/*" onchange="handleFileUpload(event, ${index})" class="text-[10px] w-full cursor-pointer">
                            </div>
                            <div class="flex gap-2 flex-1">
                                <input type="text" placeholder="URL Gambar (Blogger dll)" class="text-xs bg-white border border-slate-200 p-3 rounded-2xl flex-1 outline-none focus:ring-1 focus:ring-indigo-500" id="urlInput-${index}">
                                <button onclick="handleUrlUpload(${index})" class="bg-slate-800 text-white px-4 py-2 rounded-2xl text-xs font-bold">ADD</button>
                            </div>
                        </div>
                    </div>

                    <textarea onchange="updateChapter(${index}, 'content', this.value)" class="w-full h-48 bg-slate-50 border border-slate-100 p-5 rounded-3xl focus:ring-2 focus:ring-indigo-400 outline-none text-sm leading-relaxed" placeholder="Tuliskan isi cerita untuk bab ini...">${ch.content}</textarea>
                `;
                container.appendChild(div);
            });
        }

        // Logic Functions
        function addChapter() {
            chapters.push({ id: Date.now(), title: "Bab Baru", content: "", images: [] });
            renderChapters();
        }

        function updateChapter(idx, field, val) { chapters[idx][field] = val; }

        function removeChapter(idx) {
            if(chapters.length > 1) { chapters.splice(idx, 1); renderChapters(); }
        }

        function moveChapter(idx, dir) {
            const n = idx + dir;
            if(n >= 0 && n < chapters.length) {
                [chapters[idx], chapters[n]] = [chapters[n], chapters[idx]];
                renderChapters();
            }
        }

        async function handleFileUpload(e, idx) {
            const file = e.target.files[0];
            if(!file) return;
            toggleLoader(true, "Kazue Engine: Mengompres Gambar...");
            const buffer = await file.arrayBuffer();
            const optimized = await optimizeImage(buffer);
            chapters[idx].images.push({ id: "hkr_"+Math.random().toString(36).substr(2,5), data: optimized });
            toggleLoader(false);
            renderChapters();
        }

        async function handleUrlUpload(idx) {
            const url = document.getElementById(`urlInput-${idx}`).value;
            if(!url) return;
            toggleLoader(true, "Hikari Engine: Mengunduh Media...");
            try {
                const r = await fetch(url);
                const b = await r.blob();
                const buffer = await b.arrayBuffer();
                const optimized = await optimizeImage(buffer);
                chapters[idx].images.push({ id: "hkr_"+Math.random().toString(36).substr(2,5), data: optimized });
                document.getElementById(`urlInput-${idx}`).value = "";
            } catch(e) { alert("CORS Error. Gunakan Upload Manual jika URL diblokir."); }
            toggleLoader(false);
            renderChapters();
        }

        function deleteImage(chIdx, imgIdx) {
            chapters[chIdx].images.splice(imgIdx, 1);
            renderChapters();
        }

        // --- Core EPUB Building (Kazue Logic) ---
        async function generateEpub() {
            toggleLoader(true, "Hikari Studio: Merakit EPUB...");
            const zip = new JSZip();
            const title = document.getElementById('title').value || "Buku Hikari";
            const author = document.getElementById('author').value || "Kazue User";
            const uuid = "urn:uuid:" + self.crypto.randomUUID();

            // 1. Mimetype
            zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
            zip.folder("META-INF").file("container.xml", `<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);

            let manifest = ""; let spine = ""; let ncxNav = "";

            // 2. Chapters & Images
            chapters.forEach((ch, i) => {
                const fName = `chapter_${i+1}.xhtml`;
                let imgHtml = "";
                ch.images.forEach(img => {
                    zip.folder("OEBPS/Images").file(`${img.id}.jpg`, img.data);
                    manifest += `<item id="${img.id}" href="Images/${img.id}.jpg" media-type="image/jpeg"/>\n`;
                    imgHtml += `<div style="text-align:center;margin:1.5em 0;"><img src="../Images/${img.id}.jpg" style="max-width:100%; border-radius:10px;"/></div>\n`;
                });

                const xhtml = `<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head><title>${ch.title}</title><style>body{font-family:sans-serif;padding:6%;line-height:1.7;color:#1a1a1a;} h2{text-align:center;color:#4f46e5;border-bottom:2px solid #f1f5f9;padding-bottom:15px;}</style></head>
<body><h2>${ch.title}</h2>${imgHtml}<div style="white-space:pre-wrap;">${ch.content}</div></body></html>`;
                
                zip.folder("OEBPS/Text").file(fName, xhtml);
                manifest += `<item id="ch${i+1}" href="Text/${fName}" media-type="application/xhtml+xml"/>\n`;
                spine += `<itemref idref="ch${i+1}"/>\n`;
                ncxNav += `<navPoint id="n-${i+1}" playOrder="${i+1}"><navLabel><text>${ch.title}</text></navLabel><content src="Text/${fName}"/></navPoint>\n`;
            });

            // 3. OPF & TOC
            zip.folder("OEBPS").file("content.opf", `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" unique-identifier="id" version="3.0"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:title>${title}</dc:title><dc:creator>${author}</dc:creator><dc:language>${document.getElementById('lang').value}</dc:language><dc:identifier id="id">${uuid}</dc:identifier><dc:description>${document.getElementById('description').value}</dc:description><meta property="dcterms:modified">${new Date().toISOString().split('.')[0]}Z</meta></metadata><manifest><item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>${manifest}</manifest><spine toc="ncx">${spine}</spine></package>`);
            
            zip.folder("OEBPS").file("toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="${uuid}"/></head><docTitle><text>${title}</text></docTitle><navMap>${ncxNav}</navMap></ncx>`);

            // 4. Generate Final File with Max Compression
            const content = await zip.generateAsync({ 
                type: "blob", 
                mimeType: "application/epub+zip",
                compression: "DEFLATE",
                compressionOptions: { level: 9 }
            });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `${title.replace(/\s+/g, '_')}_hikari.epub`;
            link.click();
            toggleLoader(false);
        }

        renderChapters();
    </script>
</body>
</html>
