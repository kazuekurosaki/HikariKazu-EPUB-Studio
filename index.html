<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikari-Kazue Studio Pro v7.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.98); z-index:999; flex-direction:column; align-items:center; justify-content:center; color:white; }
        .cover-preview { width: 140px; height: 200px; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .img-grid-item { width: 100px; background: #fff; border-radius: 12px; padding: 6px; border: 1px solid #e2e8f0; text-align: center; flex-shrink: 0; }
        .img-thumb { height: 65px; width: 100%; object-fit: cover; border-radius: 8px; margin-bottom: 4px; }
        .shortcode-tag { background: #4f46e5; color: white; font-size: 8px; padding: 2px 6px; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.2s; display: block; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40">

    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-indigo-500 border-t-transparent mb-4"></div>
        <p id="loaderText" class="font-bold tracking-widest text-xs uppercase text-indigo-300">Hikari Engine v7.1: Stable Mode</p>
    </div>

    <div class="max-w-4xl mx-auto p-4 md:pt-10">
        <!-- Branding Header -->
        <header class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl mb-8 relative overflow-hidden flex flex-col md:flex-row justify-between items-center">
            <div class="relative z-10 text-center md:text-left">
                <h1 class="text-3xl font-extrabold tracking-tighter italic text-white">HIKARI <span class="text-indigo-400">STUDIO PRO</span></h1>
                <p class="text-slate-400 text-[10px] uppercase tracking-[0.3em] font-bold">Kazue Engine v7.1 • Fixed Autosave</p>
                <div id="saveStatus" class="mt-3 flex items-center gap-2 text-[9px] text-emerald-400 font-bold uppercase tracking-widest">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Autosave Active
                </div>
            </div>
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-600 rounded-full blur-3xl opacity-20"></div>
        </header>

        <!-- Metadata & Cover -->
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm mb-6 border border-slate-200 flex flex-col md:flex-row gap-8">
            <div class="flex flex-col items-center gap-3">
                <div class="w-[140px] h-[200px] bg-slate-100 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-300 relative overflow-hidden group">
                    <img id="coverDisplay" class="hidden cover-preview">
                    <div id="coverPlaceholder" class="text-center p-4">
                        <span class="text-3xl">🖼️</span>
                        <p class="text-[9px] text-slate-400 font-black mt-2 uppercase tracking-tighter">Sampul</p>
                    </div>
                    <input type="file" accept="image/*" onchange="handleCover(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
                <button onclick="removeCover()" class="text-[9px] text-red-400 font-black uppercase tracking-widest">Reset</button>
            </div>

            <div class="flex-1 grid grid-cols-1 gap-4">
                <input type="text" id="title" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-xl font-bold" placeholder="Judul Buku">
                <input type="text" id="author" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Penulis">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="lang" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl outline-none font-bold text-indigo-600 uppercase" value="id">
                    <p class="text-emerald-500 font-black p-4 text-xs text-right tracking-widest">STABLE DB</p>
                </div>
                <textarea id="description" oninput="triggerAutoSave()" class="w-full bg-slate-50 border-0 p-4 rounded-2xl outline-none text-sm" rows="2" placeholder="Sinopsis / Anotasi..."></textarea>
            </div>
        </div>

        <div id="chaptersContainer" class="space-y-10"></div>

        <button onclick="addChapter()" class="w-full mt-10 py-10 border-2 border-dashed border-slate-300 rounded-[3rem] text-slate-400 font-black hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all flex flex-col items-center">
            <span class="text-2xl">+</span>
            <p class="text-[10px] tracking-[0.2em] uppercase mt-2 font-black tracking-widest">Tambah Bab Baru</p>
        </button>
    </div>

    <!-- Floating Nav -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-slate-900/95 backdrop-blur-2xl p-4 rounded-full shadow-2xl border border-white/10 flex justify-between items-center z-50">
        <div class="pl-4">
            <p class="text-white font-black text-sm tracking-tighter" id="statsTitle">Hikari Project</p>
            <p class="text-indigo-400 text-[10px] uppercase font-black tracking-widest" id="statsChapters">0 Bab</p>
        </div>
        <div class="flex gap-2">
            <button onclick="clearData()" title="Reset" class="p-2 text-slate-500 hover:text-red-400 transition">🗑️</button>
            <button onclick="generateEpub()" id="btnDownload" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-full font-black text-xs shadow-lg transition transform active:scale-90 uppercase tracking-widest">
                Download
            </button>
        </div>
    </nav>

    <script>
        const DB_NAME = "HikariStudio_V71_STABLE";
        let db, chapters = [], coverData = null;
        let isSaving = false;

        // --- Database Logic ---
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => {
            const dbRef = e.target.result;
            if (!dbRef.objectStoreNames.contains("state")) {
                dbRef.createObjectStore("state", { keyPath: "id" });
            }
        };
        request.onsuccess = e => { db = e.target.result; loadFromDB(); };
        request.onerror = e => alert("Database Error. Jangan gunakan mode Incognito.");

        function saveToDB() {
            if(!db || isSaving) return;
            isSaving = true;
            const state = { id: "current", title: document.getElementById('title').value, author: document.getElementById('author').value, description: document.getElementById('description').value, lang: document.getElementById('lang').value, chapters: chapters, cover: coverData };
            const transaction = db.transaction("state", "readwrite");
            const store = transaction.objectStore("state");
            const putReq = store.put(state);
            putReq.onsuccess = () => {
                isSaving = false;
                document.getElementById('saveStatus').innerHTML = '<span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Draft Autosaved';
            };
            putReq.onerror = () => { isSaving = false; };
        }

        function loadFromDB() {
            const transaction = db.transaction("state", "readonly");
            const store = transaction.objectStore("state");
            store.get("current").onsuccess = e => {
                if (e.target.result) {
                    const res = e.target.result;
                    document.getElementById('title').value = res.title || "";
                    document.getElementById('author').value = res.author || "";
                    document.getElementById('description').value = res.description || "";
                    document.getElementById('lang').value = res.lang || "id";
                    chapters = res.chapters || [];
                    coverData = res.cover || null;
                    if(coverData) {
                        const img = document.getElementById('coverDisplay');
                        img.src = URL.createObjectURL(new Blob([coverData]));
                        img.classList.remove('hidden');
                        document.getElementById('coverPlaceholder').classList.add('hidden');
                    }
                }
                if (chapters.length === 0) addChapter();
                renderChapters();
                updateStats();
            };
        }

        function triggerAutoSave() {
            document.getElementById('saveStatus').innerHTML = '<span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span> Saving...';
            clearTimeout(window.saveTimeout);
            window.saveTimeout = setTimeout(saveToDB, 2000);
            updateStats();
        }

        function updateStats() {
            document.getElementById('statsTitle').innerText = document.getElementById('title').value || "Hikari Project";
            document.getElementById('statsChapters').innerText = `${chapters.length} Bab`;
        }

        // --- Kazue Engine ---
        async function optimizeImage(buffer, isCover = false) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(new Blob([buffer]));
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = isCover ? 1200 : 1080;
                    if (w > max) { h *= max/w; w = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(b => b.arrayBuffer().then(resolve), 'image/jpeg', 0.75);
                };
            });
        }

        async function handleCover(e) {
            const f = e.target.files[0]; if(!f) return;
            toggleLoader(true, "Hikari Engine: Processing Cover...");
            coverData = await optimizeImage(await f.arrayBuffer(), true);
            const img = document.getElementById('coverDisplay');
            img.src = URL.createObjectURL(new Blob([coverData]));
            img.classList.remove('hidden');
            document.getElementById('coverPlaceholder').classList.add('hidden');
            toggleLoader(false); saveToDB();
        }

        function removeCover() { coverData = null; document.getElementById('coverDisplay').classList.add('hidden'); document.getElementById('coverPlaceholder').classList.remove('hidden'); triggerAutoSave(); }

        // --- UI Chapters ---
        function renderChapters() {
            const container = document.getElementById('chaptersContainer');
            container.innerHTML = '';
            chapters.forEach((ch, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200";
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3 flex-1">
                            <span class="bg-indigo-600 text-white w-8 h-8 flex items-center justify-center rounded-xl font-black text-[10px]">${idx + 1}</span>
                            <input type="text" value="${ch.title}" oninput="chapters[${idx}].title=this.value; triggerAutoSave()" class="text-lg font-bold bg-transparent outline-none w-full border-b-2 border-transparent focus:border-indigo-500 transition p-1">
                        </div>
                        <div class="flex bg-slate-50 p-1 rounded-xl ml-2">
                            <button onclick="move(${idx}, -1)" class="p-2 hover:bg-white rounded-lg text-slate-400 hover:text-indigo-600 transition">▲</button>
                            <button onclick="move(${idx}, 1)" class="p-2 hover:bg-white rounded-lg text-slate-400 hover:text-indigo-600 transition">▼</button>
                            <button onclick="remove(${idx})" class="p-2 text-red-300 hover:text-red-500 transition ml-1">🗑️</button>
                        </div>
                    </div>
                    <div class="mb-5 bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
                        <div class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide">
                            ${ch.images.map((img, iIdx) => `
                                <div class="img-grid-item shadow-sm">
                                    <img src="${URL.createObjectURL(new Blob([img.data]))}" class="img-thumb shadow-sm">
                                    <span class="shortcode-tag" onclick="copyTag('[IMG${iIdx+1}]')">[IMG${iIdx+1}]</span>
                                    <button onclick="delImg(${idx}, ${iIdx})" class="mt-2 text-[7px] text-red-400 font-black uppercase tracking-tighter">Hapus</button>
                                </div>
                            `).join('')}
                            <div class="img-grid-item flex flex-col items-center justify-center border-dashed border-2 border-slate-200 bg-transparent min-w-[100px] min-h-[110px] relative">
                                <span class="text-2xl text-slate-300">+</span>
                                <input type="file" accept="image/*" onchange="upImg(event, ${idx})" class="absolute inset-0 opacity-0 cursor-pointer">
                            </div>
                        </div>
                    </div>
                    <textarea oninput="chapters[${idx}].content=this.value; triggerAutoSave()" class="w-full h-80 bg-slate-50 border-0 p-6 rounded-[2rem] outline-none text-sm leading-relaxed text-slate-700" placeholder="Ketik cerita. Gunakan [IMG1] dsb untuk ilustrasi full page..."></textarea>
                `;
                div.querySelector('textarea').value = ch.content;
                container.appendChild(div);
            });
        }

        async function upImg(e, i) {
            const f = e.target.files[0]; if(!f) return;
            toggleLoader(true, "Hikari Engine: Optimizing...");
            const opt = await optimizeImage(await f.arrayBuffer());
            chapters[i].images.push({ id: "hkr_"+Math.random().toString(36).substr(2,6), data: opt });
            toggleLoader(false); renderChapters(); saveToDB();
        }

        function delImg(ci, ii) { chapters[ci].images.splice(ii, 1); renderChapters(); saveToDB(); }
        function addChapter() { chapters.push({ title: "Bab Baru", content: "", images: [] }); renderChapters(); triggerAutoSave(); }
        function move(i, d) { let n = i+d; if(n>=0 && n<chapters.length) { [chapters[i], chapters[n]] = [chapters[n], chapters[i]]; renderChapters(); triggerAutoSave(); } }
        function remove(i) { if(chapters.length>1) { chapters.splice(i,1); renderChapters(); triggerAutoSave(); } }
        function copyTag(t) { navigator.clipboard.writeText(t); alert("Kode "+t+" disalin!"); }
        function toggleLoader(s, t="") { document.getElementById('loader').style.display = s?'flex':'none'; if(t) document.getElementById('loaderText').innerText = t; }
        function clearData() { if(confirm("Hapus draft?")) { db.transaction("state", "readwrite").objectStore("state").clear(); location.reload(); } }

        // --- Core Generator ---
        async function generateEpub() {
            toggleLoader(true, "Hikari Studio: Merakit EPUB...");
            const zip = new JSZip();
            const title = document.getElementById('title').value || "Buku Hikari";
            const author = document.getElementById('author').value || "Anonim";
            const uuid = "urn:uuid:" + self.crypto.randomUUID();

            zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
            zip.folder("META-INF").file("container.xml", `<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);

            let manifest = ""; let spine = ""; let ncx = "";
            if(coverData) {
                zip.folder("OEBPS/Images").file("cover.jpg", coverData);
                manifest += `<item id="cover-img" href="Images/cover.jpg" media-type="image/jpeg" properties="cover-image"/>\n`;
            }

            chapters.forEach((ch, i) => {
                const f = `ch${i+1}.xhtml`;
                let paragraphs = ch.content.split('\n').filter(p => p.trim() !== "");
                let finalContent = paragraphs.map(p => `<p>${p.trim()}</p>`).join('\n');

                ch.images.forEach((img, iIdx) => {
                    const imgID = `img_${i+1}_${iIdx+1}`;
                    zip.folder("OEBPS/Images").file(`${imgID}.jpg`, img.data);
                    manifest += `<item id="${imgID}" href="Images/${imgID}.jpg" media-type="image/jpeg"/>\n`;
                    const imgTag = `<div class="hard-page-break"><img src="../Images/${imgID}.jpg" alt="illustration"/></div>`;
                    const shortcode = `[IMG${iIdx+1}]`;
                    if (finalContent.includes(shortcode)) finalContent = finalContent.split(shortcode).join(imgTag);
                    else finalContent += imgTag;
                });

                const xhtml = `<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>${ch.title}</title><style>
body { padding: 5% 8%; line-height: 1.6; font-family: serif; color: #1a1a1a; text-align: justify; }
h2 { text-align: center; color: #4f46e5; margin-bottom: 2em; }
p { margin: 0; text-indent: 1.5em; }
.hard-page-break { display: block; page-break-before: always; page-break-after: always; text-align: center; margin: 2em 0; text-indent: 0; }
.hard-page-break img { max-width: 100%; height: auto; }</style></head><body><h2>${ch.title}</h2><div>${finalContent}</div></body></html>`;
                
                zip.folder("OEBPS/Text").file(f, xhtml);
                manifest += `<item id="item${i+1}" href="Text/${f}" media-type="application/xhtml+xml"/>\n`;
                spine += `<itemref idref="item${i+1}"/>\n`;
                ncx += `<navPoint id="n${i+1}" playOrder="${i+1}"><navLabel><text>${ch.title}</text></navLabel><content src="Text/${f}"/></navPoint>\n`;
            });

            zip.folder("OEBPS").file("content.opf", `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" unique-identifier="id" version="3.0"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:title>${title}</dc:title><dc:creator>${author}</dc:creator><dc:language>${document.getElementById('lang').value}</dc:language><dc:identifier id="id">${uuid}</dc:identifier><dc:description>${document.getElementById('description').value}</dc:description><meta property="dcterms:modified">${new Date().toISOString().split('.')[0]}Z</meta>${coverData ? '<meta name="cover" content="cover-img"/>' : ''}</metadata><manifest><item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>${manifest}</manifest><spine toc="ncx">${spine}</spine></package>`);
            zip.folder("OEBPS").file("toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="${uuid}"/></head><docTitle><text>${title}</text></docTitle><navMap>${ncx}</navMap></ncx>`);

            const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: {level:9} });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${title.replace(/\s+/g,'_')}.epub`; a.click();
            toggleLoader(false);
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
